<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CelezMods</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap');

    :root {
      --bg: #05010a;
      --panel: rgba(22, 10, 36, 0.78);
      --panel-border: rgba(196, 141, 255, 0.24);
      --text: #f5edff;
      --muted: #d7c2f5;
      --accent: #a855f7;
      --accent-strong: #c084fc;
      --badge-bg: #ffffff;
      --badge-text: #7e22ce;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(134, 54, 214, 0.22), transparent 35%),
        linear-gradient(180deg, #09020f 0%, #030106 100%);
      color: var(--text);
      font-family: 'Raleway', sans-serif;
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: 8%;
      left: -80px;
      width: 240px;
      height: 240px;
      background: rgba(168, 85, 247, 0.2);
    }

    body::after {
      right: -100px;
      bottom: 10%;
      width: 300px;
      height: 300px;
      background: rgba(216, 180, 254, 0.12);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 28px 20px 56px;
    }

    .corner-title {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(168, 85, 247, 0.55);
    }

    .corner-title .dot {
      color: #ead7ff;
    }

    .hub {
      width: min(980px, 100%);
      margin: 56px auto 0;
      padding: 34px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin-bottom: 14px;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(34px, 7vw, 64px);
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .subtitle {
      max-width: 620px;
      margin-top: 16px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.7;
    }

    .downloads {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 34px;
    }

    .download-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 88px;
      padding: 18px 20px;
      border: 1px solid rgba(224, 195, 255, 0.16);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(34, 16, 55, 0.92), rgba(18, 8, 30, 0.94));
      color: var(--text);
      text-decoration: none;
      text-align: center;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .download-card:hover,
    .download-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(216, 180, 254, 0.48);
      box-shadow: 0 18px 28px rgba(74, 25, 120, 0.32);
      outline: none;
    }

    .card-content {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .badge {
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .page {
        padding: 22px 16px 36px;
      }

      .hub {
        margin-top: 34px;
        padding: 24px 18px;
        border-radius: 22px;
      }

      .downloads {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="corner-title">CELEZ mods<span class="dot">.</span></div>

    <main class="hub">
      <div class="eyebrow">Download Hub</div>
      <h1>CELEZ mods</h1>
      <p class="subtitle">This is the new Downloading page to download my mods :D .</p>

      <section class="downloads" aria-label="Mod downloads">
        <a class="download-card" href="https://gofile.io/d/QOeRsj" target="_blank" rel="noreferrer">
          <span class="card-content">FMH2</span>
        </a>
        <a class="download-card" href="https://gofile.io/d/DKV59I" target="_blank" rel="noreferrer">
          <span class="card-content">OGScaryBaboon</span>
        </a>
        <a class="download-card" href="https://gofile.io/d/qBg4HY" target="_blank" rel="noreferrer">
          <span class="card-content">UnityTag</span>
        </a>
        <a class="download-card" href="https://gofile.io/d/gptYYZ" target="_blank" rel="noreferrer">
          <span class="card-content">ExpiditionApe</span>
        </a>
        <a class="download-card" href="https://gofile.io/d/qsK4bV" target="_blank" rel="noreferrer">
          <span class="card-content">OoglyBoogly</span>
        </a>
        <a class="download-card" href="https://gofile.io/d/0OfDbx" target="_blank" rel="noreferrer">
          <span class="card-content">RaccoonRunners <span class="badge">NEW</span></span>
        </a>
      </section>
    </main>
  </div>
</body>
</html>
